<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="description" content="Dots and Boxes on GitHub Pages" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Dots &amp; Boxes</title>
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <div>
          <h1>Dots &amp; Boxes</h1>
          <p class="app__subtitle">Claim the most boxes to win.</p>
        </div>
        <div class="app__controls">
          <label class="control">
            Theme
            <select id="theme-select" aria-label="Theme"></select>
          </label>
          <label class="control">
            Board size
            <select id="size-select" aria-label="Board size">
              <option value="4">4 x 4</option>
              <option value="5">5 x 5</option>
              <option value="6">6 x 6</option>
              <option value="7">7 x 7</option>
            </select>
          </label>
          <button id="reset-button" class="primary-button" type="button">Reset</button>
        </div>
      </header>

      <section class="app__status" aria-live="polite">
        <div id="scoreboard" class="scoreboard"></div>
        <div class="current-player">
          Current turn:
          <span id="current-player"></span>
        </div>
      </section>

      <section class="app__content">
        <div id="board" class="board-wrapper"></div>
      </section>
    </main>

    <div class="modal" id="endgame-modal" role="dialog" aria-modal="true" aria-labelledby="endgame-title" aria-describedby="endgame-summary" hidden>
      <div class="modal__content">
        <h2 id="endgame-title"></h2>
        <p id="endgame-summary"></p>
        <div id="endgame-scores" class="modal__scores"></div>
        <button id="play-again-button" class="primary-button" type="button">Play again</button>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
