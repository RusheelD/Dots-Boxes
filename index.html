<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dots & Boxes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>Dots & Boxes</h1>
          <p>Connect the edges, claim the boxes.</p>
        </div>
        <div class="toolbar">
          <div class="control">
            <span>Board size</span>
            <select id="size-select" aria-label="Board size">
              <option value="6">6x6</option>
              <option value="8">8x8</option>
              <option value="10">10x10</option>
            </select>
          </div>
          <button id="reset-button" type="button">New Game</button>
        </div>
        <div class="status">
          <span class="label">Current turn</span>
          <strong id="current-player">Player 1</strong>
        </div>
        <div id="scoreboard" class="scoreboard" aria-live="polite"></div>
      </header>
      <section class="board-wrapper">
        <div id="board" class="board-container" role="presentation"></div>
      </section>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
