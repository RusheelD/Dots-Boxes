<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dots & Boxes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <div>
          <h1 class="app__title">Dots & Boxes</h1>
          <p class="app__subtitle">Connect the edges, claim the boxes.</p>
        </div>
        <div class="toolbar__row">
          <button class="button">New Game</button>
          <button class="button button--primary">Undo</button>
        </div>
      </header>
      <section class="game-layout">
        <div class="board-shell">
          <div class="board-container">
            <svg class="board-svg" viewBox="0 0 100 100" role="img" aria-label="Game board">
              <rect x="10" y="10" width="25" height="25" class="box" fill="var(--color-player-1)"></rect>
              <rect x="40" y="10" width="25" height="25" class="box" fill="var(--color-player-2)"></rect>
              <text x="22" y="26" class="box__label">A</text>
              <text x="52" y="26" class="box__label">B</text>
              <line x1="10" y1="10" x2="35" y2="10" class="edge edge--active"></line>
              <line x1="35" y1="10" x2="60" y2="10" class="edge edge--hover"></line>
              <line x1="10" y1="10" x2="10" y2="35" class="edge"></line>
              <line x1="35" y1="10" x2="35" y2="35" class="edge"></line>
              <line x1="10" y1="10" x2="35" y2="10" class="edge-hit" tabindex="0"></line>
              <circle cx="10" cy="10" r="2.5" class="dot"></circle>
              <circle cx="35" cy="10" r="2.5" class="dot"></circle>
              <circle cx="60" cy="10" r="2.5" class="dot"></circle>
              <circle cx="10" cy="35" r="2.5" class="dot"></circle>
              <circle cx="35" cy="35" r="2.5" class="dot"></circle>
              <circle cx="60" cy="35" r="2.5" class="dot"></circle>
            </svg>
          </div>
        </div>
        <aside class="toolbar">
          <div class="toolbar__section">
            <span class="toolbar__label">Current Turn</span>
            <div class="player-chip player-chip--p1">
              <span class="player-chip__swatch"></span>
              Player 1
            </div>
          </div>
          <div class="toolbar__section stats-card">
            <div class="stats-row">
              <span>Player 1</span>
              <strong>4</strong>
            </div>
            <div class="stats-row">
              <span>Player 2</span>
              <strong>2</strong>
            </div>
          </div>
          <div class="toolbar__section">
            <span class="toolbar__label">Board Size</span>
            <div class="toolbar__row">
              <button class="button">6x6</button>
              <button class="button">8x8</button>
              <button class="button">10x10</button>
            </div>
          </div>
        </aside>
      </section>
    </main>
  </body>
</html>
