<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dots and Boxes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1 class="app-title">Dots and Boxes</h1>
        <p class="app-subtitle">Configure board size and preview counts.</p>
      </header>

      <section class="controls" aria-label="Board settings">
        <div class="control-group">
          <label class="control-label" for="board-size">Board size</label>
          <select class="select-input" id="board-size" name="board-size">
            <option value="6">6 x 6</option>
            <option value="7">7 x 7</option>
            <option value="8">8 x 8</option>
            <option value="9">9 x 9</option>
            <option value="10">10 x 10</option>
          </select>
        </div>
        <p id="board-size-label" class="board-meta" aria-live="polite"></p>
      </section>

      <section class="scoreboard" aria-label="Scoreboard">
        <article class="score-card">
          <h3>Player 1</h3>
          <p><span id="score-player-1">0</span> boxes</p>
        </article>
        <article class="score-card">
          <h3>Player 2</h3>
          <p><span id="score-player-2">0</span> boxes</p>
        </article>
      </section>

      <section class="board-container" aria-label="Board summary">
        <div id="board-summary" class="board-grid"></div>
      </section>
    </main>
    <script src="game.js"></script>
    <script src="ui.js"></script>
  </body>
</html>
